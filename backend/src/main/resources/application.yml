spring:
  application:
    name: pollsystem

  # Default to the `local` profile when SPRING_PROFILES_ACTIVE is not set.
  # Deployed environments override this (e.g. SPRING_PROFILES_ACTIVE=prod).
  # The active profile picks which JavaMailSender bean MailConfig wires.
  profiles:
    default: local

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/pollsystem
    username: polladmin
    password: pollpass123
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Flyway Database Migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Mail wiring lives in org.kodewerks.pollsystem.email.MailConfig — see it for the
# `local` (Mailpit) vs default (SendGrid) JavaMailSender beans.

# Application config
app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-change-in-production}
    expiration-ms: 7776000000  # 90 days — cuts repeat magic-link emails by ~95%. Tradeoff: a leaked JWT is valid for the full window (no server-side revocation).
  results:
    k-anonymity-threshold: 10  # min responses to show filtered aggregates
  magic-link:
    ttl-minutes: 15
    base-url: ${APP_BASE_URL:http://localhost:3000}
  stripe:
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    tolerance-seconds: 300

# Server
server:
  port: 8080
  # Surface ResponseStatusException.reason in the JSON error body so the
  # frontend can show real validation messages instead of a generic fallback.
  error:
    include-message: always
  # The ZipSetter / PollSearchView cascade can hit /api/zipcodes?county_ids=…
  # with thousands of IDs when a user picks broad geo scope (51 states ⇒
  # 3143 counties ⇒ ~15KB query string). Tomcat's default 8KB request-line
  # limit rejects that with a connection-reset. 64KB covers the worst case
  # for the seeded dev DB.
  # TODO: convert /api/zipcodes (and /api/counties) to POST + JSON body for
  # production. URLs that long aren't routable through every proxy / CDN.
  max-http-request-header-size: 64KB

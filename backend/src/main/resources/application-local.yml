# Local-development profile. Activate with SPRING_PROFILES_ACTIVE=local.
#
# Points outbound mail at a Mailpit container running on localhost:1025; the
# web UI at http://localhost:8025 shows every email the backend would have
# sent, with magic-link URLs that route back to the Vite dev server.
spring:
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  magic-link:
    base-url: http://localhost:3000

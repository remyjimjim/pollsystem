
services:
  db:
    image: postgres:16
    container_name: pollsystem-db
    environment:
      POSTGRES_USER: polladmin
      POSTGRES_PASSWORD: pollpass123
      POSTGRES_DB: pollsystem
    ports:
      - "5432:5432"
    volumes:
      - pollsystem-data:/var/lib/postgresql/data

volumes:
  pollsystem-data:
